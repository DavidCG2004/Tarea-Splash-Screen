<div class="splash-container" [class.visible]="visible">

  <div class="splash-content">

    <!-- Ícono / Logo -->
    <div class="splash-icon">
      <ion-icon name="images-outline"></ion-icon>
    </div>

    <!-- Nombre de la app -->
    <h1 class="splash-title">GALERÍA</h1>
    <h2 class="splash-subtitle">Experience</h2>

    <!-- Mensaje de bienvenida -->
    <p class="splash-welcome">Bienvenido a tu galería de fotos</p>

    <!-- Versión -->
    <p class="splash-version">v1.0.0</p>

    <!-- Spinner de carga -->
    <div class="splash-spinner">
      <ion-spinner name="crescent" color="light"></ion-spinner>
    </div>

  </div>

</div>
