<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Galeria de Fotos</ion-title>

    <!-- Botones de acción: aparecen solo cuando hay foto seleccionada -->
    <ion-buttons slot="end" *ngIf="selectedPhoto">
      <ion-button (click)="shareSelected()" fill="clear" color="primary">
        <ion-icon slot="icon-only" name="share-social-outline"></ion-icon>
      </ion-button>
      <ion-button (click)="deleteSelected()" fill="clear" color="danger">
        <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
      </ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Galeria de Fotos</ion-title>
    </ion-toolbar>
  </ion-header>

  <!-- Indicador de selección activa -->
  <ion-item *ngIf="selectedPhoto" color="light" lines="none">
    <ion-icon name="checkmark-circle" color="success" slot="start"></ion-icon>
    <ion-label>
      <small>Foto seleccionada — usa los íconos de arriba para compartir o eliminar</small>
    </ion-label>
    <ion-button slot="end" fill="clear" color="medium" (click)="selectPhoto(selectedPhoto!, selectedPosition)">
      <ion-icon slot="icon-only" name="close-outline"></ion-icon>
    </ion-button>
  </ion-item>

  <ion-grid>
    <ion-row>
      <ion-col
        size="6"
        *ngFor="let photo of photoService.photos; index as position"
        (click)="selectPhoto(photo, position)">

        <!-- Resaltado visual cuando la foto está seleccionada -->
        <div [class.photo-selected]="selectedPosition === position" class="photo-wrapper">
          <ion-img [src]="photo.webviewPath"></ion-img>
          <div class="photo-overlay" *ngIf="selectedPosition === position">
            <ion-icon name="checkmark-circle" color="success" size="large"></ion-icon>
          </div>
        </div>

      </ion-col>
    </ion-row>
  </ion-grid>

  <!-- Botón de cámara -->
  <ion-fab vertical="bottom" horizontal="center" slot="fixed">
    <ion-fab-button (click)="addPhotoToGallery()">
      <ion-icon name="camera"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
